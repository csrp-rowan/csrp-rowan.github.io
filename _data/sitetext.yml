en: &DEFAULT_EN
  header:
    title: ACM CSRP
    text: Fifth Biannual Series
    button: Tell Me More
    buttonlink: "#services"

  services:
    title: "Events"
    text: "We host research-focused sessions where faculty and students share published work, discuss influential papers, and occasionally run hands-on workshops. Come to learn what’s new, ask good questions, and leave with ideas you can use in your own projects."
    section: services
    list:
      - title: "Faculty Research Talks"
        desc: "Faculty present their published and in-progress research with a focus on the core idea, key results, and takeaways. Q&A includes methods, limitations, and open problems—plus how students can connect or collaborate."
        icon: fas fa-chalkboard-teacher

      - title: "Student Research Talks"
        desc: "Students share accepted papers, posters, or research milestones, and sometimes a ‘what I learned’ talk after reading a landmark paper. Great for practice, feedback, and building research confidence."
        icon: fas fa-laptop

      #- title: "Paper Reading Sessions"
      #  desc: "Guided discussions of recent or classic papers. We cover the main contributions, assumptions, experimental design, and what still isn’t solved—so you build research taste, not just a reading list."
      #  icon: fas fa-book-open

      - title: "Workshops"
        desc: "Occasional skill sessions on tools and habits that make research smoother—literature search, LaTeX, reproducibility, peer review, research storytelling, and presenting technical work clearly."
        icon: fas fa-tools

  portfolio:
    title: "Research Ambassadors"
    text: "Step into the spotlight once, join us for 8 more talks, and graduate the semester as a Research Ambassador, with a certificate to celebrate your research engagement."

    section: portfolio

    ambassadors:
      - term: "Fall 2025 Ambassadors"
