  about:
    title: "About Us"
    text: "ACM CSRP presents the Research Presentation Series, your weekly window into what’s happening across Computer Science."
    body: "Each week, a student or faculty member highlights a recently published paper or a high-impact research result, followed by an open discussion on the key ideas, evidence, limitations, and future directions. After every session, we stick around to socialize, connect with presenters, and meet other research-minded students.\n\n**The series is a Qualified Honors College “think” experience!**\n\nCSRP is a great way to build research confidence and community: sharpen how you read and discuss papers, learn about research opportunities in the CS Department (including paid roles), add a strong line to your CV/resume, generate new project ideas, and spark new collaborations—all in a welcoming, low-pressure environment."
    section: about
  team:
    title: "MEET THE TEAM"
    text: "A group of students and faculty building a stronger research community."
    subtext: "We organize weekly talks, share opportunities, and connect students with labs, mentors, and collaborators across Rowan. Want to present, suggest a topic, or **be part of the team**? Reach out, [Contact us](#contact) we’re always looking for more help."
